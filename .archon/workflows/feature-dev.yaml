name: feature-dev
description: |
  Feature development with plan, implement, validate, review — adapted for Pi/DeepSeek.
  Input: Feature description in natural language
  Output: Feature implemented, validated, and PR-ready

nodes:
  - id: create-plan
    command: archon-create-plan
    context: fresh
    model: openrouter/deepseek/deepseek-v4-flash
    effort: high

  - id: plan-setup
    command: archon-plan-setup
    depends_on: [create-plan]
    context: fresh
    model: openrouter/deepseek/deepseek-v4-flash

  - id: confirm-plan
    command: archon-confirm-plan
    depends_on: [plan-setup]
    context: fresh
    model: openrouter/deepseek/deepseek-v4-flash

  - id: implement-tasks
    command: archon-implement-tasks
    depends_on: [confirm-plan]
    context: fresh
    model: openrouter/deepseek/deepseek-v3.2
    effort: max

  - id: validate
    command: archon-validate
    depends_on: [implement-tasks]
    context: fresh
    model: openrouter/deepseek/deepseek-v4-flash

  - id: finalize-pr
    command: archon-finalize-pr
    depends_on: [validate]
    context: fresh
    model: openrouter/deepseek/deepseek-v4-flash

  - id: verify-pr-base
    bash: |
      set -euo pipefail
      EXPECTED="$BASE_BRANCH"
      ACTUAL=$(gh pr view --json baseRefName -q '.baseRefName')
      if [ "$ACTUAL" != "$EXPECTED" ]; then
        PR_NUMBER=$(gh pr view --json number -q '.number')
        echo "Base mismatch on PR #$PR_NUMBER: expected=$EXPECTED actual=$ACTUAL — re-targeting" >&2
        gh pr edit "$PR_NUMBER" --base "$EXPECTED"
      else
        echo "PR base verified: $EXPECTED"
      fi
    depends_on: [finalize-pr]

  - id: review-scope
    command: archon-pr-review-scope
    depends_on: [verify-pr-base]
    context: fresh
    model: openrouter/deepseek/deepseek-v4-flash

  - id: sync
    command: archon-sync-pr-with-main
    depends_on: [review-scope]
    context: fresh
    model: openrouter/deepseek/deepseek-v4-flash

  - id: code-review
    command: archon-code-review-agent
    depends_on: [sync]
    context: fresh
    model: openrouter/deepseek/deepseek-v4-flash

  - id: error-handling
    command: archon-error-handling-agent
    depends_on: [sync]
    context: fresh
    model: openrouter/deepseek/deepseek-v4-flash

  - id: test-coverage
    command: archon-test-coverage-agent
    depends_on: [sync]
    context: fresh
    model: openrouter/deepseek/deepseek-v4-flash

  - id: comment-quality
    command: archon-comment-quality-agent
    depends_on: [sync]
    context: fresh
    model: openrouter/deepseek/deepseek-v4-flash

  - id: docs-impact
    command: archon-docs-impact-agent
    depends_on: [sync]
    context: fresh
    model: openrouter/deepseek/deepseek-v4-flash

  - id: synthesize
    command: archon-synthesize-review
    depends_on: [code-review, error-handling, test-coverage, comment-quality, docs-impact]
    trigger_rule: one_success
    context: fresh
    model: openrouter/deepseek/deepseek-v4-flash

  - id: implement-fixes
    command: archon-implement-review-fixes
    depends_on: [synthesize]
    context: fresh
    model: openrouter/deepseek/deepseek-v3.2
    effort: max

  - id: summary
    command: archon-workflow-summary
    depends_on: [implement-fixes]
    context: fresh
    model: openrouter/deepseek/deepseek-v4-flash

  # ─── Push notification via ntfy ──────────────────────────────
  # To enable, .archon/mcp/ntfy.json must exist (see docs/mcp-servers.md)
  - id: check-ntfy
    bash: test -f .archon/mcp/ntfy.json && echo 'true' || echo 'false'
    depends_on: [summary]

  - id: notify
    depends_on: [check-ntfy, summary]
    when: "$check-ntfy.output == 'true'"
    mcp: .archon/mcp/ntfy.json
    allowed_tools: []
    prompt: |
      Send a push notification summarizing the completed feature development workflow.
      Summary output:
      $summary.output
      Send with:
      - title: "🚀 Feature Dev Complete"
      - message: 1-2 sentence summary — what was built, key metrics. Short enough for a lock screen.
      - priority: 4